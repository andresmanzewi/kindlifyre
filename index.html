<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Kindlifyre</title>
  <style>
    body{font-family:sans-serif;text-align:center;margin:40px 12px;}
    a{display:inline-block;margin:10px;padding:14px 18px;border:2px solid #000;border-radius:999px;text-decoration:none;color:#000;}
  </style>
</head>
<body>
  <p>Routing…</p>
  <p>
    <a href="./remote.html">Open Remote</a>
    <a href="./pair.html">Open Pairing</a>
  </p>

<script>
(function () {
  var ua = (navigator.userAgent || "").toLowerCase();

  // Kindle identifiers vary by model/firmware. These catch most.
  var isKindle =
    ua.indexOf("kindle") !== -1 ||
    ua.indexOf("silk") !== -1 ||
    ua.indexOf("kfw") !== -1 ||
    ua.indexOf("kf") !== -1;

  // If you ever test on an Amazon Fire tablet, it may route to remote too (often fine).
  var target = isKindle ? "./remote.html" : "./pair.html";

  // Replace prevents the back button bouncing between pages
  window.location.replace(target);
})();
</script>

<noscript>
  <p>JavaScript is required. Choose a page:</p>
  <p>
    <a href="./remote.html">Remote (Kindle)</a>
    <a href="./pair.html">Pairing (Phone)</a>
  </p>
</noscript>
</body>
</html>
