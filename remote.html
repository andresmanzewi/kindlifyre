<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Kindle Spotify Remote</title>
<style>
  :root{
    --fg:#000;
    --muted:#333;
    --border:3px;
    --radius:16px;
    --pill:999px;
  }
  body{
    font-family:sans-serif;
    background:#fff;
    color:#000;
    margin:18px 10px;
    text-align:center;
  }
  .wrap{max-width:520px;margin:0 auto;}
  .qrArea{
    width:260px;
    margin:0 auto 14px;
    padding:10px;
    border:var(--border) solid var(--fg);
    border-radius:var(--radius);
  }
  .qrArea img{
    width:240px;height:240px;
    border:var(--border) solid var(--fg);
    border-radius:14px;
    display:block;
    margin:0 auto;
  }
  .codeLine{
    display:flex;
    justify-content:center;
    align-items:center;
    gap:10px;
    margin-top:10px;
    flex-wrap:wrap;
  }
  input{
    font-size:22px;
    padding:10px 14px;
    width:170px;
    text-align:center;
    border:var(--border) solid var(--fg);
    border-radius:12px;
    background:#fff;
  }
  .pill{
    font-size:18px;
    padding:10px 16px;
    border:var(--border) solid var(--fg);
    border-radius:var(--pill);
    background:#fff;
  }
  .hint{
    font-size:14px;
    color:var(--muted);
    margin-top:8px;
  }

  .artWrap{
    width:280px;height:280px;
    margin:16px auto 12px;
    border:var(--border) solid var(--fg);
    border-radius:14px;
    overflow:hidden;
    display:none;
    background:#fff;
  }
  .artWrap img{width:100%;height:100%;object-fit:cover;}

  .track{
    font-size:20px;
    line-height:1.25;
    margin:10px 0 6px;
    min-height:52px;
  }
  .artist{
    font-size:16px;
    color:var(--muted);
    margin-bottom:6px;
    min-height:20px;
  }
  .deviceType{
    display:flex;
    justify-content:center;
    align-items:center;
    min-height:22px;
    margin-bottom:12px;
  }

  .controls{
    display:none;
    justify-content:center;
    align-items:center;
    gap:18px;
    margin-top:10px;
  }
  .roundBtn{
    width:86px;height:86px;
    border-radius:999px;
    border:var(--border) solid var(--fg);
    background:#fff;
    display:grid;
    place-items:center;
    -webkit-tap-highlight-color: transparent;
    user-select:none;
  }
  .roundBtn.center{width:96px;height:96px;}
  .roundBtn:active{transform:scale(0.98);}
  svg{fill:#000;width:34px;height:34px;}
  .center svg{width:40px;height:40px;}

  .utility{
    display:none;
    justify-content:center;
    gap:10px;
    flex-wrap:wrap;
    margin-top:14px;
  }

  #status{
    margin-top:12px;
    font-size:14px;
    color:var(--muted);
    min-height:18px;
  }
</style>
</head>
  <script src="./qrcode.min.js"></script>
<body>
<div class="wrap">

  <div class="qrArea">
    <div id="qrBox"></div>
    <div class="codeLine">
      <input id="code" inputmode="numeric" maxlength="6" placeholder="Pair code">
      <button id="connect" class="pill">Connect</button>
    </div>
    <div class="hint">Scan QR on your phone to pair, or type the code manually.</div>
  </div>

  <div class="artWrap" id="artWrap"><img id="art" alt=""></div>

  <div class="track" id="track">—</div>
  <div class="artist" id="artist"></div>

  <div class="deviceType" id="deviceType">
    <svg id="iconPhone" viewBox="0 0 64 64" style="display:none;width:22px;height:22px;fill:#000;">
      <path d="M22 6h20a6 6 0 0 1 6 6v40a6 6 0 0 1-6 6H22a6 6 0 0 1-6-6V12a6 6 0 0 1 6-6zm0 8v36h20V14H22z"></path>
    </svg>
    <svg id="iconComputer" viewBox="0 0 64 64" style="display:none;width:24px;height:24px;fill:#000;">
      <path d="M8 12h48a4 4 0 0 1 4 4v26a4 4 0 0 1-4 4H8a4 4 0 0 1-4-4V16a4 4 0 0 1 4-4zm0 6v22h48V18H8zm18 30h12l2 6H24l2-6z"></path>
    </svg>
  </div>

  <div class="controls" id="controls">
    <button class="roundBtn" id="prev" aria-label="Previous">
      <svg viewBox="0 0 64 64"><path d="M18 14h6v36h-6zM46 16 26 32l20 16V16z"></path></svg>
    </button>

    <button class="roundBtn center" id="toggle" aria-label="Play/Pause">
      <svg id="iconPlay" viewBox="0 0 64 64" style="display:none;"><path d="M24 18v28l24-14-24-14z"></path></svg>
      <svg id="iconPause" viewBox="0 0 64 64" style="display:none;"><path d="M22 18h8v28h-8zM34 18h8v28h-8z"></path></svg>
    </button>

    <button class="roundBtn" id="next" aria-label="Next">
      <svg viewBox="0 0 64 64"><path d="M40 14h6v36h-6zM18 16v32l20-16-20-16z"></path></svg>
    </button>
  </div>

  <div class="utility" id="utility">
    <button id="refresh" class="pill">Refresh</button>
    <button id="newCode" class="pill">New code</button>
  </div>

  <div id="status"></div>

</div>

<script>
const WORKER_BASE = "https://kindlifyre-api.andrespmanzewitsch.workers.dev";
const PAIR_URL_BASE = "https://andresmanzewi.github.io/kindlifyre/pair.html";

const elTrack = document.getElementById("track");
const elArtist = document.getElementById("artist");
const elStatus = document.getElementById("status");
const elControls = document.getElementById("controls");
const elUtility = document.getElementById("utility");

const elArtWrap = document.getElementById("artWrap");
const elArt = document.getElementById("art");

const iconPlay = document.getElementById("iconPlay");
const iconPause = document.getElementById("iconPause");

const iconPhone = document.getElementById("iconPhone");
const iconComputer = document.getElementById("iconComputer");

const qrImg = document.getElementById("qrImg");
const inputCode = document.getElementById("code");

let CODE = "";
let pollTimer = null;

function setStatus(t){ elStatus.textContent = t || ""; }
function setText(track, artist){
  elTrack.textContent = track || "—";
  elArtist.textContent = artist || "";
}
function setPlayingIcon(isPlaying){
  iconPlay.style.display = isPlaying ? "none" : "block";
  iconPause.style.display = isPlaying ? "block" : "none";
}
function setDeviceIcon(type){
  iconPhone.style.display = "none";
  iconComputer.style.display = "none";
  if (!type) return;
  const n = String(type).toLowerCase();
  if (n.includes("phone") || n.includes("smartphone")) iconPhone.style.display = "block";
  else iconComputer.style.display = "block";
}

function randCode(){
  return String(Math.floor(100000 + Math.random()*900000));
}

function setQrForCode(code){
  var pairUrl = PAIR_URL_BASE + "?code=" + encodeURIComponent(code);

  // Clear previous QR
  var box = document.getElementById("qrBox");
  box.innerHTML = "";

  // Generate QR (no external requests)
  new QRCode(box, {
    text: pairUrl,
    width: 240,
    height: 240,
    correctLevel: QRCode.CorrectLevel.M
  });

  inputCode.value = code;
}
}

async function apiState(){
  const r = await fetch(`${WORKER_BASE}/state?code=${encodeURIComponent(CODE)}`);
  return r.json();
}
async function apiCmd(name){
  const r = await fetch(`${WORKER_BASE}/cmd?code=${encodeURIComponent(CODE)}&name=${encodeURIComponent(name)}`, { method:"POST" });
  return r.json();
}

function chooseSquareArt(item){
  const imgs = item?.album?.images;
  if (!Array.isArray(imgs) || imgs.length === 0) return "";
  if (imgs.length >= 2) return imgs[Math.floor(imgs.length/2)].url || imgs[0].url || "";
  return imgs[0].url || "";
}

async function refresh(){
  try{
    const s = await apiState();
    if(!s.ok) throw new Error(s.error || "error");

    if(!s.active){
      setText("No active device", "Start playing on phone/speaker");
      setDeviceIcon("");
      setPlayingIcon(false);
      elArtWrap.style.display = "none";
      setStatus("Connected.");
      return;
    }

    const pb = s.data;
    const item = pb.item;

    setText(item?.name || "Unknown track", item?.artists?.map(a=>a.name).join(", ") || "Unknown artist");
    setDeviceIcon(pb?.device?.type || "");
    setPlayingIcon(!!pb.is_playing);

    const artUrl = chooseSquareArt(item);
    if (artUrl) {
      if (elArt.getAttribute("data-src") !== artUrl) {
        elArt.setAttribute("data-src", artUrl);
        elArt.src = artUrl;
      }
      elArtWrap.style.display = "block";
    } else {
      elArtWrap.style.display = "none";
    }

    setStatus("");
  } catch(e){
    setStatus("Error: " + (e.message || e));
  }
}

function startPolling(){
  stopPolling();
  pollTimer = setInterval(refresh, 12000);
}
function stopPolling(){
  if (pollTimer) { clearInterval(pollTimer); pollTimer = null; }
}

function connectWithCode(c){
  CODE = c;
  localStorage.setItem("kindlifyre_code", CODE);
  elControls.style.display = "flex";
  elUtility.style.display = "flex";
  setStatus("Connected.");
  refresh();
  startPolling();
}

document.getElementById("connect").onclick = () => {
  const c = inputCode.value.trim();
  if(!/^\d{6}$/.test(c)){ setStatus("Enter your 6-digit code."); return; }
  connectWithCode(c);
};

document.getElementById("refresh").onclick = () => refresh();

document.getElementById("newCode").onclick = () => {
  stopPolling();
  CODE = "";
  elControls.style.display = "none";
  elUtility.style.display = "none";
  elArtWrap.style.display = "none";
  setText("—", "");
  setDeviceIcon("");
  setPlayingIcon(false);

  const fresh = randCode();
  localStorage.setItem("kindlifyre_code", fresh);
  setQrForCode(fresh);
  setStatus("New code generated. Scan again to pair.");
};

document.getElementById("next").onclick = async()=> {
  setStatus("…");
  const r = await apiCmd("next");
  if (!r.ok) setStatus("Error: " + (r.error || "next failed"));
  await new Promise(res => setTimeout(res, 450));
  await refresh();
};

document.getElementById("prev").onclick = async()=> {
  setStatus("…");
  const r = await apiCmd("prev");
  if (!r.ok) setStatus("Error: " + (r.error || "prev failed"));
  await new Promise(res => setTimeout(res, 450));
  await refresh();
};

document.getElementById("toggle").onclick = async()=> {
  setStatus("…");
  const s = await apiState();
  if (!s.ok) { setStatus("Error: " + (s.error || "toggle failed")); return; }
  if (!s.active) { setStatus("Start playback on phone/speaker first."); return; }
  const r = await apiCmd(s.data.is_playing ? "pause" : "play");
  if (!r.ok) setStatus("Error: " + (r.error || "command failed"));
  await new Promise(res => setTimeout(res, 350));
  await refresh();
};

// Auto show QR on load (reuse saved code if available)
(function init(){
  setPlayingIcon(false);
  setStatus("Scan QR to pair, then Connect.");

  const saved = localStorage.getItem("kindlifyre_code");
  const code = (/^\d{6}$/.test(saved || "")) ? saved : randCode();
  localStorage.setItem("kindlifyre_code", code);
  setQrForCode(code);
})();
</script>
</body>
</html>
