<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Kindle Spotify Remote</title>

<style>
:root{
  --fg:#000;
  --muted:#333;
  --border:3px;          /* heavy borders used elsewhere */
  --softBorder:2px;      /* softer border for outer QR card */
  --radius:16px;
  --pill:999px;
}

body{
  font-family:sans-serif;
  background:#fff;
  color:#000;
  margin:18px 10px;
  text-align:center;
}

.wrap{max-width:520px;margin:0 auto;}

/* Outer pairing card (soft) */
.qrArea{
  width:292px;
  margin:0 auto 18px;
  padding:22px 14px 18px;               /* more air above */
  border:var(--softBorder) solid var(--fg);
  border-radius:var(--radius);
}

/* QR container */
#qrBox{
  width:260px;
  height:260px;
  margin:8px auto 0;
  display:block;
  position:relative;
}

/* QR itself: square edges */
#qrBox img,#qrBox canvas,#qrBox table{
  border:var(--border) solid var(--fg);
  border-radius:0;
  width:260px !important;
  height:260px !important;
}

/* Placeholder / errors */
.qrFallback{
  width:260px;height:260px;
  border:var(--border) dashed var(--fg);
  border-radius:0;
  display:block;
  font-size:14px;
  color:var(--muted);
  padding:10px;
  box-sizing:border-box;
  white-space:pre-line;
  line-height:1.3;
  text-align:center;
}

/* Divider between QR and manual entry */
.divider{
  width:260px;
  margin:16px auto 0;
  display:flex;
  align-items:center;
  gap:10px;
  color:var(--muted);
  font-size:13px;
}
.divider:before,
.divider:after{
  content:"";
  flex:1;
  height:1px;
  background:#000;
  opacity:0.35; /* soften line */
}

/* Manual entry (secondary) */
.codeLine{
  display:flex;
  flex-direction:column;
  justify-content:center;
  align-items:center;
  gap:12px;           /* input/button spacing */
  margin-top:12px;    /* space under divider */
  opacity:0.88;       /* slightly secondary */
}

input{
  font-size:22px;
  padding:10px 14px;
  width:170px;
  text-align:center;
  border:var(--border) solid var(--fg);
  border-radius:12px;
  background:#fff;
}

.pill{
  font-size:17px;
  padding:10px 22px;
  border:2px solid var(--fg);          /* lighter than main borders */
  border-radius:var(--pill);
  background:#fff;
}

/* One instruction only, inside card */
.hint{
  font-size:13px;
  color:var(--muted);
  margin-top:10px;
  line-height:1.3;
}

/* Album art + playback */
.artWrap{
  width:280px;height:280px;
  margin:16px auto 12px;
  border:var(--border) solid var(--fg);
  border-radius:14px;
  overflow:hidden;
  display:none;
  background:#fff;
}
.artWrap img{width:100%;height:100%;object-fit:cover;}

.track{
  font-size:20px;
  line-height:1.25;
  margin:10px 0 6px;
  min-height:52px;
}
.artist{
  font-size:16px;
  color:var(--muted);
  margin-bottom:6px;
  min-height:20px;
}

.deviceType{
  display:flex;
  justify-content:center;
  align-items:center;
  min-height:22px;
  margin-bottom:12px;
}

/* Transport controls */
.controls{
  display:none;
  justify-content:center;
  align-items:center;
  gap:18px;
  margin-top:10px;
}
.roundBtn{
  width:86px;height:86px;
  border-radius:999px;
  border:var(--border) solid var(--fg);
  background:#fff;
  display:grid;
  place-items:center;
  user-select:none;
}
.roundBtn.center{width:96px;height:96px;}
.roundBtn:active{transform:scale(0.98);}

svg{fill:#000;width:34px;height:34px;}
.center svg{width:40px;height:40px;}

.utility{
  display:none;
  justify-content:center;
  gap:10px;
  flex-wrap:wrap;
  margin-top:14px;
}

#status{
  margin-top:12px;
  font-size:14px;
  color:var(--muted);
  min-height:18px;
}
</style>
</head>

<body>
<div class="wrap">

  <div class="qrArea">
    <div id="qrBox">
      <div class="qrFallback" id="qrFallback">Loading QR…</div>
    </div>

    <div class="divider">OR</div>

    <div class="codeLine">
      <input id="code" inputmode="numeric" maxlength="6" placeholder="Pair code">
      <button id="connect" class="pill">Connect</button>
    </div>

    <div class="hint" id="hint">
      Scan the QR on your phone to pair. Manual code is a fallback.
    </div>
  </div>

  <div class="artWrap" id="artWrap"><img id="art" alt=""></div>

  <div class="track" id="track">—</div>
  <div class="artist" id="artist"></div>

  <div class="deviceType" id="deviceType">
    <svg id="iconPhone" viewBox="0 0 64 64" style="display:none;width:22px;height:22px;">
      <path d="M22 6h20a6 6 0 0 1 6 6v40a6 6 0 0 1-6 6H22a6 6 0 0 1-6-6V12a6 6 0 0 1 6-6zm0 8v36h20V14H22z"></path>
    </svg>
    <svg id="iconComputer" viewBox="0 0 64 64" style="display:none;width:24px;height:24px;">
      <path d="M8 12h48a4 4 0 0 1 4 4v26a4 4 0 0 1-4 4H8a4 4 0 0 1-4-4V16a4 4 0 0 1 4-4zm0 6v22h48V18H8zm18 30h12l2 6H24l2-6z"></path>
    </svg>
  </div>

  <div class="controls" id="controls">
    <button class="roundBtn" id="prev" aria-label="Previous">
      <svg viewBox="0 0 64 64"><path d="M18 14h6v36h-6zM46 16 26 32l20 16V16z"></path></svg>
    </button>

    <button class="roundBtn center" id="toggle" aria-label="Play/Pause">
      <svg id="iconPlay" viewBox="0 0 64 64" style="display:none;"><path d="M24 18v28l24-14-24-14z"></path></svg>
      <svg id="iconPause" viewBox="0 0 64 64" style="display:none;"><path d="M22 18h8v28h-8zM34 18h8v28h-8z"></path></svg>
    </button>

    <button class="roundBtn" id="next" aria-label="Next">
      <svg viewBox="0 0 64 64"><path d="M40 14h6v36h-6zM18 16v32l20-16-20-16z"></path></svg>
    </button>
  </div>

  <div class="utility" id="utility">
    <button id="refresh" class="pill">Refresh</button>
    <button id="newCode" class="pill">New code</button>
  </div>

  <div id="status"></div>
</div>

<script>
(function(){
  var WORKER_BASE = "https://kindlifyre-api.andrespmanzewitsch.workers.dev";
  var PAIR_URL_BASE = "https://andresmanzewi.github.io/kindlifyre/pair.html";

  var elTrack = document.getElementById("track");
  var elArtist = document.getElementById("artist");
  var elStatus = document.getElementById("status");
  var elControls = document.getElementById("controls");
  var elUtility = document.getElementById("utility");
  var elArtWrap = document.getElementById("artWrap");
  var elArt = document.getElementById("art");

  var iconPlay = document.getElementById("iconPlay");
  var iconPause = document.getElementById("iconPause");
  var iconPhone = document.getElementById("iconPhone");
  var iconComputer = document.getElementById("iconComputer");

  var qrBox = document.getElementById("qrBox");
  var qrFallback = document.getElementById("qrFallback");
  var inputCode = document.getElementById("code");
  var hint = document.getElementById("hint");

  var CODE = "";
  var pollTimer = null;

  function setStatus(t){ elStatus.textContent = t || ""; }

  function randCode(){
    return String(Math.floor(100000 + Math.random()*900000));
  }

  function setPlayingIcon(isPlaying){
    iconPlay.style.display = isPlaying ? "none" : "block";
    iconPause.style.display = isPlaying ? "block" : "none";
  }

  function setDeviceIcon(type){
    iconPhone.style.display = "none";
    iconComputer.style.display = "none";
    if (!type) return;
    var t = String(type).toLowerCase();
    if (t.indexOf("phone") !== -1 || t.indexOf("smartphone") !== -1) iconPhone.style.display = "block";
    else iconComputer.style.display = "block";
  }

  function chooseArt(item){
    if (!item || !item.album || !item.album.images || !item.album.images.length) return "";
    var imgs = item.album.images;
    var mid = imgs[Math.floor(imgs.length/2)];
    return (mid && mid.url) ? mid.url : (imgs[0] && imgs[0].url ? imgs[0].url : "");
  }

  function loadQrLib(cb){
    var s = document.createElement("script");
    s.src = "./qrcode.min.js";
    s.onload = function(){ cb(true); };
    s.onerror = function(){ cb(false); };
    document.body.appendChild(s);

    setTimeout(function(){
      if (typeof window.QRCode === "undefined") cb(false);
    }, 3000);
  }

  function renderQrFor(code){
    inputCode.value = code;

    if (typeof window.QRCode === "undefined") {
      qrFallback.textContent =
        "QR library not loaded.\n\nConfirm:\n/kindlifyre/qrcode.min.js\nexists.\n\nManual code still works.";
      hint.textContent = "Open pair.html on your phone and type the code manually.";
      return;
    }

    qrBox.innerHTML = "";
    new window.QRCode(qrBox, {
      text: PAIR_URL_BASE + "?code=" + encodeURIComponent(code),
      width: 260,
      height: 260,
      correctLevel: window.QRCode.CorrectLevel.M
    });
  }

  function apiState(done){
    var xhr = new XMLHttpRequest();
    xhr.open("GET", WORKER_BASE + "/state?code=" + encodeURIComponent(CODE), true);
    xhr.onreadystatechange = function(){
      if (xhr.readyState !== 4) return;
      try { done(JSON.parse(xhr.responseText)); }
      catch(e){ done({ ok:false, error:"bad json" }); }
    };
    xhr.send(null);
  }

  function apiCmd(name, done){
    var xhr = new XMLHttpRequest();
    xhr.open("POST", WORKER_BASE + "/cmd?code=" + encodeURIComponent(CODE) + "&name=" + encodeURIComponent(name), true);
    xhr.onreadystatechange = function(){
      if (xhr.readyState !== 4) return;
      try { done(JSON.parse(xhr.responseText)); }
      catch(e){ done({ ok:false, error:"bad json" }); }
    };
    xhr.send(null);
  }

  function refresh(){
    apiState(function(s){
      if (!s || !s.ok) { setStatus("Error: " + (s && s.error ? s.error : "state")); return; }

      if (!s.active) {
        elTrack.textContent = "No active device";
        elArtist.textContent = "Start playback on phone";
        elArtWrap.style.display = "none";
        setDeviceIcon("");
        setPlayingIcon(false);
        return;
      }

      var pb = s.data || {};
      var item = pb.item || null;

      elTrack.textContent = item && item.name ? item.name : "Unknown";
      if (item && item.artists && item.artists.length) {
        var names = [];
        for (var i=0;i<item.artists.length;i++) names.push(item.artists[i].name);
        elArtist.textContent = names.join(", ");
      } else {
        elArtist.textContent = "";
      }

      setDeviceIcon(pb.device && pb.device.type ? pb.device.type : "");
      setPlayingIcon(!!pb.is_playing);

      var art = chooseArt(item);
      if (art) {
        if (elArt.getAttribute("data-src") !== art) {
          elArt.setAttribute("data-src", art);
          elArt.src = art;
        }
        elArtWrap.style.display = "block";
      }
      setStatus("");
    });
  }

  function connectWithCode(c){
    CODE = c;
    try { localStorage.setItem("kindlifyre_code", CODE); } catch(e) {}
    elControls.style.display = "flex";
    elUtility.style.display = "flex";
    refresh();
    if (pollTimer) clearInterval(pollTimer);
    pollTimer = setInterval(refresh, 12000);
  }

  document.getElementById("connect").onclick = function(){
    var c = (inputCode.value || "").replace(/\s+/g,"");
    if (!/^\d{6}$/.test(c)) { setStatus("Enter 6 digits."); return; }
    connectWithCode(c);
  };

  document.getElementById("refresh").onclick = function(){ refresh(); };

  document.getElementById("newCode").onclick = function(){
    if (pollTimer) clearInterval(pollTimer);
    elControls.style.display = "none";
    elUtility.style.display = "none";
    elArtWrap.style.display = "none";
    elTrack.textContent = "—";
    elArtist.textContent = "";
    setDeviceIcon("");
    setPlayingIcon(false);

    var fresh = randCode();
    try { localStorage.setItem("kindlifyre_code", fresh); } catch(e) {}
    qrBox.innerHTML = '<div class="qrFallback">Loading QR…</div>';
    renderQrFor(fresh);
    setStatus("New code generated.");
  };

  document.getElementById("next").onclick = function(){
    apiCmd("next", function(){ setTimeout(refresh, 500); });
  };
  document.getElementById("prev").onclick = function(){
    apiCmd("prev", function(){ setTimeout(refresh, 500); });
  };
  document.getElementById("toggle").onclick = function(){
    apiState(function(s){
      if (!s || !s.ok || !s.active) { setStatus("Start playback first."); return; }
      apiCmd(s.data && s.data.is_playing ? "pause" : "play", function(){ setTimeout(refresh, 400); });
    });
  };

  (function init(){
    setStatus("");              /* no duplicate instructions outside */
    setPlayingIcon(false);

    var saved = "";
    try { saved = localStorage.getItem("kindlifyre_code") || ""; } catch(e) {}

    var code = /^\d{6}$/.test(saved) ? saved : randCode();
    try { localStorage.setItem("kindlifyre_code", code); } catch(e) {}

    loadQrLib(function(){ renderQrFor(code); });
  })();

})();
</script>

</body>
</html>
