<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Kindle Spotify Remote</title>

<style>
:root{
  --fg:#000;
  --muted:#333;
  --border:3px;
  --softBorder:2px;
  --radius:16px;
  --pill:999px;
}

body{
  font-family:sans-serif;
  background:#fff;
  color:#000;
  margin:18px 10px;
  text-align:center;
}

.wrap{max-width:520px;margin:0 auto;}

.card{
  width:292px;
  margin:0 auto 16px;
  padding:18px 14px 16px;
  border:var(--softBorder) solid var(--fg);
  border-radius:var(--radius);
}

/* QR */
#qrBox{
  width:260px;
  height:260px;
  margin:8px auto 0;
  display:block;
}

#qrBox img,#qrBox canvas,#qrBox table{
  border:var(--border) solid var(--fg);
  border-radius:0;
  width:260px !important;
  height:260px !important;
}

.qrFallback{
  width:260px;height:260px;
  border:var(--border) dashed var(--fg);
  border-radius:0;
  display:block;
  font-size:14px;
  color:var(--muted);
  padding:10px;
  box-sizing:border-box;
  white-space:pre-line;
  line-height:1.3;
  text-align:center;
}

/* Divider */
.divider{
  width:260px;
  margin:16px auto 0;
  display:flex;
  align-items:center;
  gap:10px;
  font-size:12px;
  color:var(--muted);
}
.divider:before,
.divider:after{
  content:"";
  flex:1;
  height:1px;
  background:#000;
  opacity:0.25;
}

/* Manual entry */
.codeLine{
  display:flex;
  flex-direction:column;
  align-items:center;
  gap:14px;
  margin-top:14px;
}

/* No box for input */
input{
  font-size:24px;
  text-align:center;
  border:none;
  background:transparent;
  outline:none;
  width:180px;
  letter-spacing:4px;
}

/* Only connect styled */
.pill{
  font-size:17px;
  padding:10px 26px;
  border:2px solid var(--fg);
  border-radius:var(--pill);
  background:#fff;
}

/* Player */
.playerCard{ padding:14px 14px 16px; }

.artWrap{
  width:264px;height:264px;
  margin:0 auto 12px;
  border:var(--border) solid var(--fg);
  border-radius:14px;
  overflow:hidden;
  display:none;
  background:#fff;
}
.artWrap img{width:100%;height:100%;object-fit:cover;}

.track{
  font-size:20px;
  line-height:1.25;
  margin:8px 0 6px;
  min-height:52px;
  overflow:hidden;
  text-overflow:ellipsis;
  display:-webkit-box;
  -webkit-line-clamp:2;
  -webkit-box-orient:vertical;
}

.artist{
  font-size:16px;
  color:var(--muted);
  margin-bottom:6px;
  min-height:20px;
  overflow:hidden;
  text-overflow:ellipsis;
  white-space:nowrap;
}

.deviceType{
  display:flex;
  justify-content:center;
  align-items:center;
  min-height:22px;
  margin-bottom:6px;
}

.stateDot{
  width:10px;height:10px;
  border:2px solid #000;
  border-radius:999px;
  margin:6px auto 12px;
}
.stateDot.playing{ background:#000; }

.controls{
  display:none;
  justify-content:center;
  align-items:center;
  gap:18px;
  margin-top:2px;
}

.roundBtn{
  width:86px;height:86px;
  border-radius:999px;
  border:var(--border) solid var(--fg);
  background:#fff;
  display:grid;
  place-items:center;
}

.roundBtn.center{width:96px;height:96px;}

svg{fill:#000;width:34px;height:34px;}
.center svg{width:40px;height:40px;}

.utility{
  display:none;
  justify-content:center;
  gap:10px;
  flex-wrap:wrap;
  margin-top:14px;
}

#status{ display:none; } /* hide status box completely */

</style>
</head>

<body>
<div class="wrap">

  <!-- Pairing card -->
  <div class="card">
    <div id="qrBox">
      <div class="qrFallback" id="qrFallback">Loading…</div>
    </div>

    <div class="divider"></div>

    <div class="codeLine">
      <input id="code" inputmode="numeric" maxlength="6">
      <button id="connect" class="pill">Connect</button>
    </div>
  </div>

  <!-- Player card -->
  <div class="card playerCard">
    <div class="artWrap" id="artWrap"><img id="art" alt=""></div>

    <div class="track" id="track">—</div>
    <div class="artist" id="artist"></div>

    <div class="deviceType" id="deviceType">
      <svg id="iconPhone" viewBox="0 0 64 64" style="display:none;width:22px;height:22px;">
        <path d="M22 6h20a6 6 0 0 1 6 6v40a6 6 0 0 1-6 6H22a6 6 0 0 1-6-6V12a6 6 0 0 1 6-6zm0 8v36h20V14H22z"></path>
      </svg>
      <svg id="iconComputer" viewBox="0 0 64 64" style="display:none;width:24px;height:24px;">
        <path d="M8 12h48a4 4 0 0 1 4 4v26a4 4 0 0 1-4 4H8a4 4 0 0 1-4-4V16a4 4 0 0 1 4-4zm0 6v22h48V18H8zm18 30h12l2 6H24l2-6z"></path>
      </svg>
    </div>

    <div class="stateDot" id="stateDot"></div>

    <div class="controls" id="controls">
      <button class="roundBtn" id="prev">
        <svg viewBox="0 0 64 64"><path d="M18 14h6v36h-6zM46 16 26 32l20 16V16z"></path></svg>
      </button>

      <button class="roundBtn center" id="toggle">
        <svg id="iconPlay" viewBox="0 0 64 64" style="display:none;"><path d="M24 18v28l24-14-24-14z"></path></svg>
        <svg id="iconPause" viewBox="0 0 64 64" style="display:none;"><path d="M22 18h8v28h-8zM34 18h8v28h-8z"></path></svg>
      </button>

      <button class="roundBtn" id="next">
        <svg viewBox="0 0 64 64"><path d="M40 14h6v36h-6zM18 16v32l20-16-20-16z"></path></svg>
      </button>
    </div>

    <div class="utility" id="utility">
      <button id="refresh" class="pill">Refresh</button>
      <button id="sleep" class="pill">Sleep</button>
      <button id="newCode" class="pill">New code</button>
    </div>
  </div>

</div>

<script>
(function(){
  var WORKER_BASE = "https://kindlifyre-api.andrespmanzewitsch.workers.dev";
  var PAIR_URL_BASE = "https://andresmanzewi.github.io/kindlifyre/pair.html";

  var elTrack = document.getElementById("track");
  var elArtist = document.getElementById("artist");
  var elControls = document.getElementById("controls");
  var elUtility = document.getElementById("utility");
  var elArtWrap = document.getElementById("artWrap");
  var elArt = document.getElementById("art");

  var iconPlay = document.getElementById("iconPlay");
  var iconPause = document.getElementById("iconPause");
  var iconPhone = document.getElementById("iconPhone");
  var iconComputer = document.getElementById("iconComputer");
  var stateDot = document.getElementById("stateDot");

  var qrBox = document.getElementById("qrBox");
  var inputCode = document.getElementById("code");

  var sleepBtn = document.getElementById("sleep");

  var CODE = "";
  var pollTimer = null;
  var pollEnabled = true;

  function randCode(){
    return String(Math.floor(100000 + Math.random()*900000));
  }

  function setPlayingIcon(isPlaying){
    iconPlay.style.display = isPlaying ? "none" : "block";
    iconPause.style.display = isPlaying ? "block" : "none";
    stateDot.className = "stateDot" + (isPlaying ? " playing" : "");
  }

  function setDeviceIcon(type){
    iconPhone.style.display = "none";
    iconComputer.style.display = "none";
    if (!type) return;
    var t = String(type).toLowerCase();
    if (t.indexOf("phone") !== -1) iconPhone.style.display = "block";
    else iconComputer.style.display = "block";
  }

  function chooseArt(item){
    if (!item || !item.album || !item.album.images) return "";
    var imgs = item.album.images;
    if (!imgs.length) return "";
    var mid = imgs[Math.floor(imgs.length/2)];
    return mid && mid.url ? mid.url : imgs[0].url;
  }

  function apiState(done){
    var xhr = new XMLHttpRequest();
    xhr.open("GET", WORKER_BASE + "/state?code=" + encodeURIComponent(CODE), true);
    xhr.onreadystatechange = function(){
      if (xhr.readyState !== 4) return;
      try { done(JSON.parse(xhr.responseText)); }
      catch(e){ done({ ok:false }); }
    };
    xhr.send(null);
  }

  function refresh(){
    apiState(function(s){
      if (!s || !s.ok || !s.active) return;

      var pb = s.data;
      var item = pb.item;

      elTrack.textContent = item && item.name ? item.name : "Unknown";

      if (item && item.artists) {
        var names = [];
        for (var i=0;i<item.artists.length;i++) names.push(item.artists[i].name);
        elArtist.textContent = names.join(", ");
      }

      setDeviceIcon(pb.device ? pb.device.type : "");
      setPlayingIcon(pb.is_playing);

      var art = chooseArt(item);
      if (art) {
        if (elArt.getAttribute("data-src") !== art) {
          elArt.setAttribute("data-src", art);
          elArt.src = art;
        }
        elArtWrap.style.display = "block";
      }

      if (!pollTimer && pollEnabled) {
        pollTimer = setInterval(refresh, 12000);
      }
    });
  }

  function connectWithCode(c){
    CODE = c;
    elControls.style.display = "flex";
    elUtility.style.display = "flex";
    refresh();
  }

  document.getElementById("connect").onclick = function(){
    var c = (inputCode.value || "").replace(/\s+/g,"");
    if (!/^\d{6}$/.test(c)) return;
    connectWithCode(c);
  };

  document.getElementById("sleep").onclick = function(){
    pollEnabled = !pollEnabled;
    sleepBtn.textContent = pollEnabled ? "Sleep" : "Wake";
    if (!pollEnabled && pollTimer) {
      clearInterval(pollTimer);
      pollTimer = null;
    }
    if (pollEnabled) refresh();
  };

  document.getElementById("refresh").onclick = function(){ refresh(); };

  document.getElementById("next").onclick = function(){
    var xhr = new XMLHttpRequest();
    xhr.open("POST", WORKER_BASE + "/cmd?code=" + CODE + "&name=next", true);
    xhr.send(null);
  };

  document.getElementById("prev").onclick = function(){
    var xhr = new XMLHttpRequest();
    xhr.open("POST", WORKER_BASE + "/cmd?code=" + CODE + "&name=prev", true);
    xhr.send(null);
  };

  document.getElementById("toggle").onclick = function(){
    apiState(function(s){
      if (!s || !s.ok || !s.active) return;
      var cmd = s.data.is_playing ? "pause" : "play";
      var xhr = new XMLHttpRequest();
      xhr.open("POST", WORKER_BASE + "/cmd?code=" + CODE + "&name=" + cmd, true);
      xhr.send(null);
    });
  };

})();
</script>

</body>
</html>
