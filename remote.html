<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Kindle Spotify Remote</title>

<style>
:root{
  --fg:#000;
  --muted:#333;
  --border:2px;
  --radius:18px;
}

body{
  font-family:sans-serif;
  background:#fff;
  color:#000;
  margin:18px 10px;
  text-align:center;
}

.wrap{max-width:640px;margin:0 auto;}

/* Wider than before, but not huge */
.card{
  width:420px;
  max-width:92vw;
  margin:0 auto 18px;
  padding:20px 16px 18px;
  border:2px solid var(--fg);
  border-radius:var(--radius);
  box-sizing:border-box;
}

/* Pairing card */
#qrBox{
  width:300px;
  height:300px;
  margin:8px auto 0;
}

#qrBox img,#qrBox canvas,#qrBox table{
  border:2px solid var(--fg);
  border-radius:0;
  width:300px !important;
  height:300px !important;
}

.qrFallback{
  width:300px;height:300px;
  border:2px dashed var(--fg);
  display:flex;
  align-items:center;
  justify-content:center;
  font-size:14px;
  color:var(--muted);
  box-sizing:border-box;
}

.divider{
  width:300px;
  margin:18px auto 0;
  display:flex;
  align-items:center;
}
.divider:before,
.divider:after{
  content:"";
  flex:1;
  height:1px;
  background:#000;
  opacity:0.25;
}

.codeText{
  margin-top:16px;
  font-size:30px;
  letter-spacing:6px;
}

/* Player */
.artWrap{
  width:300px;height:300px;
  margin:0 auto 14px;
  border:2px solid var(--fg);
  border-radius:14px;
  overflow:hidden;
  display:none;
  box-sizing:border-box;
}
.artWrap img{width:100%;height:100%;object-fit:cover;display:block;}

.track{
  font-size:22px;
  line-height:1.25;
  margin:8px 0 6px;
  min-height:56px;
  overflow:hidden;
  text-overflow:ellipsis;
  display:-webkit-box;
  -webkit-line-clamp:2;
  -webkit-box-orient:vertical;
}

.artist{
  font-size:16px;
  color:var(--muted);
  margin-bottom:8px;
  white-space:nowrap;
  overflow:hidden;
  text-overflow:ellipsis;
}

.deviceType{
  min-height:24px;
  margin-bottom:6px;
}

.stateDot{
  width:10px;height:10px;
  border:2px solid #000;
  border-radius:999px;
  margin:6px auto 16px;
}
.stateDot.playing{ background:#000; }

.controls{
  display:none;
  justify-content:center;
  align-items:center;
  gap:36px;
  margin-top:10px;
}

.roundBtn{
  width:82px;height:82px;
  border-radius:999px;
  border:2px solid var(--fg);
  background:#fff;
  display:grid;
  place-items:center;
  padding:0;
}

.roundBtn.center{
  width:92px;height:92px;
}

.controls svg{
  display:block;
  margin:0 auto;
  fill:#000;
  width:34px;height:34px;
}
.roundBtn.center svg{width:40px;height:40px;}

#status{display:none;}
</style>
</head>

<body>
<div class="wrap">

  <div class="card" id="pairCard">
    <div id="qrBox">
      <div class="qrFallback">Loading…</div>
    </div>
    <div class="divider"></div>
    <div class="codeText" id="codeText">------</div>
  </div>

  <div class="card">
    <div class="artWrap" id="artWrap"><img id="art" alt=""></div>

    <div class="track" id="track">—</div>
    <div class="artist" id="artist"></div>

    <div class="deviceType" id="deviceType">
      <svg id="iconPhone" viewBox="0 0 64 64" style="display:none;width:22px;height:22px;">
        <path d="M22 6h20a6 6 0 0 1 6 6v40a6 6 0 0 1-6 6H22a6 6 0 0 1-6-6V12a6 6 0 0 1 6-6zm0 8v36h20V14H22z"></path>
      </svg>
      <svg id="iconComputer" viewBox="0 0 64 64" style="display:none;width:24px;height:24px;">
        <path d="M8 12h48a4 4 0 0 1 4 4v26a4 4 0 0 1-4 4H8a4 4 0 0 1-4-4V16a4 4 0 0 1 4-4zm0 6v22h48V18H8zm18 30h12l2 6H24l2-6z"></path>
      </svg>
    </div>

    <div class="stateDot" id="stateDot"></div>

    <div class="controls" id="controls">
      <button class="roundBtn" id="prev" aria-label="Previous">
        <svg viewBox="0 0 64 64">
          <path d="M50 16v32L26 32l24-16zM14 16v32l10-8V24l-10-8z"></path>
        </svg>
      </button>

      <button class="roundBtn center" id="toggle" aria-label="Play/Pause">
        <svg id="iconPlay" viewBox="0 0 64 64" style="display:none;">
          <path d="M26 16v32l26-16-26-16z"></path>
        </svg>
        <svg id="iconPause" viewBox="0 0 64 64" style="display:none;">
          <path d="M22 18h8v28h-8zM34 18h8v28h-8z"></path>
        </svg>
      </button>

      <button class="roundBtn" id="next" aria-label="Next">
        <svg viewBox="0 0 64 64">
          <path d="M14 16v32l24-16-24-16zM40 16v32l10-8V24l-10-8z"></path>
        </svg>
      </button>
    </div>

    <div id="status"></div>
  </div>

</div>

<script>
(function(){

  var WORKER_BASE = "https://kindlifyre-api.andrespmanzewitsch.workers.dev";
  var PAIR_URL_BASE = "https://andresmanzewi.github.io/kindlifyre/pair.html";

  var pairCard = document.getElementById("pairCard");
  var qrBox = document.getElementById("qrBox");
  var codeText = document.getElementById("codeText");

  var elTrack = document.getElementById("track");
  var elArtist = document.getElementById("artist");
  var elArtWrap = document.getElementById("artWrap");
  var elArt = document.getElementById("art");
  var elControls = document.getElementById("controls");

  var iconPlay = document.getElementById("iconPlay");
  var iconPause = document.getElementById("iconPause");
  var iconPhone = document.getElementById("iconPhone");
  var iconComputer = document.getElementById("iconComputer");
  var stateDot = document.getElementById("stateDot");

  var CODE = "";
  var pollTimer = null;
  var pairWatchTimer = null;

  // warm-up: poll faster immediately after connect so UI fills quickly
  var warmUntil = 0;

  function randCode(){
    return String(Math.floor(100000 + Math.random()*900000));
  }

  function stopPolling(){
    if (pollTimer) { clearInterval(pollTimer); pollTimer = null; }
  }

  function startPolling(){
    stopPolling();
    if (!CODE) return;

    var interval = (Date.now() < warmUntil) ? 1000 : 12000;

    pollTimer = setInterval(function(){
      refresh();
      // when warm period ends, restart at slow interval
      if (Date.now() >= warmUntil && interval !== 12000) startPolling();
    }, interval);
  }

  function setPlayingIcon(isPlaying){
    iconPlay.style.display = isPlaying ? "none" : "block";
    iconPause.style.display = isPlaying ? "block" : "none";
    stateDot.className = "stateDot" + (isPlaying ? " playing" : "");
  }

  function setDeviceIcon(type){
    iconPhone.style.display = "none";
    iconComputer.style.display = "none";
    if (!type) return;
    var t = String(type).toLowerCase();
    if (t.indexOf("phone") !== -1 || t.indexOf("smartphone") !== -1) iconPhone.style.display = "block";
    else iconComputer.style.display = "block";
  }

  // Robust: do NOT rely on width field. Prefer middle image if present.
  function chooseArt(item){
    if (!item || !item.album || !item.album.images || !item.album.images.length) return "";
    var imgs = item.album.images;
    var mid = imgs[Math.floor(imgs.length/2)];
    return (mid && mid.url) ? mid.url : (imgs[0] && imgs[0].url ? imgs[0].url : "");
  }

  function loadQrLib(cb){
    var s = document.createElement("script");
    s.src = "./qrcode.min.js";
    s.onload = function(){ cb(true); };
    s.onerror = function(){ cb(false); };
    document.body.appendChild(s);

    setTimeout(function(){
      if (typeof window.QRCode === "undefined") cb(false);
    }, 2500);
  }

  function renderQrFor(code){
    codeText.textContent = code;

    if (typeof window.QRCode === "undefined") {
      qrBox.innerHTML = '<div class="qrFallback">QR missing.\nCheck qrcode.min.js</div>';
      return;
    }

    qrBox.innerHTML = "";
    new window.QRCode(qrBox, {
      text: PAIR_URL_BASE + "?p=" + encodeURIComponent(code),
      width: 300,
      height: 300,
      correctLevel: window.QRCode.CorrectLevel.M
    });
  }

  function apiState(code, done){
    var xhr = new XMLHttpRequest();
    // add t= to avoid any caching weirdness
    xhr.open("GET", WORKER_BASE + "/state?code=" + encodeURIComponent(code) + "&t=" + Date.now(), true);
    xhr.onreadystatechange = function(){
      if (xhr.readyState !== 4) return;
      try { done(JSON.parse(xhr.responseText)); }
      catch(e){ done(null); }
    };
    xhr.send(null);
  }

  function apiCmd(name){
    var xhr = new XMLHttpRequest();
    xhr.open("POST", WORKER_BASE + "/cmd?code=" + encodeURIComponent(CODE) + "&name=" + encodeURIComponent(name), true);
    xhr.send(null);
  }

  function setConnected(){
    if (pairWatchTimer) { clearInterval(pairWatchTimer); pairWatchTimer = null; }

    if (pairCard) pairCard.style.display = "none";
    elControls.style.display = "flex";

    warmUntil = Date.now() + 12000; // 12s warm-up
    refresh();                      // immediate
    startPolling();                 // fast then slow
  }

  // Check fast at first so it feels instant, then slow down
  function startAutoConnectWatch(code){
    if (pairWatchTimer) clearInterval(pairWatchTimer);

    var tries = 0;
    pairWatchTimer = setInterval(function(){
      if (CODE) return;

      apiState(code, function(s){
        if (s && s.ok) {
          CODE = code;
          setConnected();
        }
      });

      tries++;
      if (tries === 10) { // after ~10 seconds, reduce frequency
        clearInterval(pairWatchTimer);
        pairWatchTimer = setInterval(function(){
          if (CODE) return;
          apiState(code, function(s){
            if (s && s.ok) {
              CODE = code;
              setConnected();
            }
          });
        }, 4000);
      }
    }, 1000);
  }

  function refresh(){
    if (!CODE) return;

    apiState(CODE, function(s){
      if (!s || !s.ok) return;

      var pb = s.data || {};
      var item = pb.item || null;

      // Track/artist can update even if "active" is false in some edge cases
      if (item && item.name) elTrack.textContent = item.name;

      if (item && item.artists && item.artists.length) {
        var names = [];
        for (var i=0;i<item.artists.length;i++) names.push(item.artists[i].name);
        elArtist.textContent = names.join(", ");
      }

      setDeviceIcon(pb.device && pb.device.type ? pb.device.type : "");
      setPlayingIcon(!!pb.is_playing);

      var art = chooseArt(item);
      if (art) {
        if (elArt.getAttribute("data-src") !== art) {
          elArt.setAttribute("data-src", art);
          elArt.src = art;
        }
        elArtWrap.style.display = "block";
      }
    });
  }

  // Controls
  document.getElementById("next").onclick = function(){
    if (!CODE) return;
    apiCmd("next");
    setTimeout(refresh, 350);
  };

  document.getElementById("prev").onclick = function(){
    if (!CODE) return;
    apiCmd("prev");
    setTimeout(refresh, 350);
  };

  document.getElementById("toggle").onclick = function(){
    if (!CODE) return;
    apiState(CODE, function(s){
      if (!s || !s.ok) return;
      var isPlaying = s.data && s.data.is_playing;
      apiCmd(isPlaying ? "pause" : "play");
      setTimeout(refresh, 300);
    });
  };

  // INIT: always new code on load
  (function init(){
    setPlayingIcon(false);

    var code = randCode();

    loadQrLib(function(){
      renderQrFor(code);
      startAutoConnectWatch(code);
    });
  })();

})();
</script>

</body>
</html>
