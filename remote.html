<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Kindle Spotify Remote</title>
<style>
  :root {
    --bg: #fff;
    --fg: #000;
    --muted: #333;
    --btnSize: 86px;
    --btnSizeCenter: 96px;
    --border: 3px;
  }

  body{
    font-family: sans-serif;
    background: var(--bg);
    color: var(--fg);
    margin: 24px 10px;
    text-align: center;
  }

  .wrap{
    max-width: 520px;
    margin: 0 auto;
  }

  /* Pair row */
  .pairRow{
    display: flex;
    gap: 10px;
    justify-content: center;
    align-items: center;
    margin-bottom: 18px;
    flex-wrap: wrap;
  }

  input{
    font-size: 22px;
    padding: 12px 14px;
    width: 170px;
    text-align: center;
    border: var(--border) solid var(--fg);
    border-radius: 12px;
    background: #fff;
    color: #000;
  }

  .pillBtn{
    font-size: 18px;
    padding: 12px 16px;
    border: var(--border) solid var(--fg);
    border-radius: 999px;
    background: #fff;
    color: #000;
  }

  /* Album art */
  .artWrap{
    width: 280px;
    height: 280px;
    margin: 10px auto 14px;
    border: var(--border) solid var(--fg);
    border-radius: 14px;
    overflow: hidden;
    display: none;
    background: #fff;
  }
  .artWrap img{
    width: 100%;
    height: 100%;
    object-fit: cover;
    image-rendering: auto;
  }

  /* Track text */
  .track{
    font-size: 20px;
    line-height: 1.25;
    margin: 10px 0 6px;
    min-height: 52px;
    white-space: normal;
  }
  .artist{
    font-size: 16px;
    color: var(--muted);
    margin-bottom: 10px;
    min-height: 20px;
  }

  /* Device type */
  .deviceType{
    font-size: 14px;
    color: var(--muted);
    margin-bottom: 18px;
    min-height: 18px;
  }

  /* Transport controls */
  .controls{
    display: none;
    justify-content: center;
    align-items: center;
    gap: 18px;
    margin-top: 10px;
  }

  .roundBtn{
    width: var(--btnSize);
    height: var(--btnSize);
    border-radius: 999px;
    border: var(--border) solid var(--fg);
    background: #fff;
    display: grid;
    place-items: center;
    user-select: none;
    -webkit-tap-highlight-color: transparent;
  }

  .roundBtn.center{
    width: var(--btnSizeCenter);
    height: var(--btnSizeCenter);
  }

  .roundBtn:active{
    transform: scale(0.98);
  }

  svg{
    width: 34px;
    height: 34px;
    fill: #000;
  }
  .center svg{
    width: 40px;
    height: 40px;
  }

  /* Status line */
  #status{
    margin-top: 14px;
    font-size: 14px;
    color: var(--muted);
    min-height: 18px;
  }

  /* Small utility row */
  .utility{
    display: none;
    margin-top: 14px;
    gap: 10px;
    justify-content: center;
    flex-wrap: wrap;
  }

  /* Kindle-friendly: keep it simple */
</style>
</head>
<body>
<div class="wrap">

  <div class="pairRow">
    <input id="code" inputmode="numeric" maxlength="6" placeholder="Pair code">
    <button id="connect" class="pillBtn">Connect</button>
    <button id="refresh" class="pillBtn" style="display:none;">Refresh</button>
  </div>

  <div class="artWrap" id="artWrap">
    <img id="art" alt="">
  </div>

  <div class="track" id="track">—</div>
  <div class="artist" id="artist"></div>
  <div class="deviceType" id="deviceType" style="display:flex;justify-content:center;align-items:center;">
  <svg id="iconPhone" viewBox="0 0 64 64" style="display:none;width:22px;height:22px;fill:#000;">
    <path d="M22 6h20a6 6 0 0 1 6 6v40a6 6 0 0 1-6 6H22a6 6 0 0 1-6-6V12a6 6 0 0 1 6-6zm0 8v36h20V14H22z"></path>
  </svg>
  <svg id="iconComputer" viewBox="0 0 64 64" style="display:none;width:24px;height:24px;fill:#000;">
    <path d="M8 12h48a4 4 0 0 1 4 4v26a4 4 0 0 1-4 4H8a4 4 0 0 1-4-4V16a4 4 0 0 1 4-4zm0 6v22h48V18H8zm18 30h12l2 6H24l2-6z"></path>
  </svg>
</div>

  <div class="controls" id="controls">
    <button class="roundBtn" id="prev" aria-label="Previous">
      <!-- Prev icon -->
      <svg viewBox="0 0 64 64" aria-hidden="true">
        <path d="M18 14h6v36h-6zM46 16 26 32l20 16V16z"></path>
      </svg>
    </button>

    <button class="roundBtn center" id="toggle" aria-label="Play/Pause">
      <!-- Will swap between play/pause -->
      <svg id="iconPlay" viewBox="0 0 64 64" aria-hidden="true" style="display:none;">
        <path d="M24 18v28l24-14-24-14z"></path>
      </svg>
      <svg id="iconPause" viewBox="0 0 64 64" aria-hidden="true" style="display:none;">
        <path d="M22 18h8v28h-8zM34 18h8v28h-8z"></path>
      </svg>
    </button>

    <button class="roundBtn" id="next" aria-label="Next">
      <!-- Next icon -->
      <svg viewBox="0 0 64 64" aria-hidden="true">
        <path d="M40 14h6v36h-6zM18 16v32l20-16-20-16z"></path>
      </svg>
    </button>
  </div>

  <div class="utility" id="utility">
    <button id="clearCode" class="pillBtn">Change code</button>
  </div>

  <div id="status"></div>
</div>

<script>
const WORKER_BASE = "https://kindlifyre-api.andrespmanzewitsch.workers.dev";

const elTrack = document.getElementById("track");
const elArtist = document.getElementById("artist");
const elDeviceType = document.getElementById("deviceType");
const elStatus = document.getElementById("status");
const elControls = document.getElementById("controls");
const elUtility = document.getElementById("utility");
const elRefresh = document.getElementById("refresh");

const elArtWrap = document.getElementById("artWrap");
const elArt = document.getElementById("art");

const iconPlay = document.getElementById("iconPlay");
const iconPause = document.getElementById("iconPause");

let CODE = "";
let pollTimer = null;

function setStatus(t){ elStatus.textContent = t || ""; }
function setText(track, artist){
  elTrack.textContent = track || "—";
  elArtist.textContent = artist || "";
}
const iconPhone = document.getElementById("iconPhone");
const iconComputer = document.getElementById("iconComputer");

function setDeviceLabel(type){
  iconPhone.style.display = "none";
  iconComputer.style.display = "none";

  if (!type) return;

  const normalized = String(type).toLowerCase();

  if (normalized.includes("phone") || normalized.includes("smartphone")) {
    iconPhone.style.display = "block";
  } else {
    iconComputer.style.display = "block";
  }
}

function setPlayingIcon(isPlaying){
  iconPlay.style.display = isPlaying ? "none" : "block";
  iconPause.style.display = isPlaying ? "block" : "none";
}

async function apiState(){
  const r = await fetch(`${WORKER_BASE}/state?code=${encodeURIComponent(CODE)}`);
  return r.json();
}
async function apiCmd(name){
  const r = await fetch(`${WORKER_BASE}/cmd?code=${encodeURIComponent(CODE)}&name=${encodeURIComponent(name)}`, { method:"POST" });
  return r.json();
}

function chooseSquareArt(item){
  // Prefer a medium-ish square for e-ink; fall back as needed
  const imgs = item?.album?.images;
  if (!Array.isArray(imgs) || imgs.length === 0) return "";
  // Spotify returns images sorted largest->smallest (usually). Pick middle when available.
  if (imgs.length >= 2) return imgs[Math.floor(imgs.length/2)].url || imgs[0].url || "";
  return imgs[0].url || "";
}

async function refresh(){
  try{
    const s = await apiState();
    if(!s.ok) throw new Error(s.error || "error");

    if(!s.active){
      setText("No active device", "Start playing on phone/speaker");
      setDeviceLabel("");
      setPlayingIcon(false);
      elArtWrap.style.display = "none";
      setStatus("Connected.");
      return;
    }

    const pb = s.data;
    const item = pb.item;

    const track = item?.name || "Unknown track";
    const artist = item?.artists?.map(a=>a.name).join(", ") || "Unknown artist";
    setText(track, artist);

    setDeviceLabel(pb?.device?.type || "");
    setPlayingIcon(!!pb.is_playing);

    const artUrl = chooseSquareArt(item);
    if (artUrl) {
      // Avoid reloading the same art (reduces e-ink refresh churn)
      if (elArt.getAttribute("data-src") !== artUrl) {
        elArt.setAttribute("data-src", artUrl);
        elArt.src = artUrl;
      }
      elArtWrap.style.display = "block";
    } else {
      elArtWrap.style.display = "none";
    }

    setStatus(pb.is_playing ? "" : "");
  } catch(e){
    setStatus("Error: " + (e.message || e));
  }
}

function startPolling(){
  stopPolling();
  // Kindle/e-ink friendly: 12s. You can raise to 15–20s if you want even less refresh.
  pollTimer = setInterval(refresh, 12000);
}
function stopPolling(){
  if (pollTimer) { clearInterval(pollTimer); pollTimer = null; }
}

function connectWithCode(c){
  CODE = c;
  localStorage.setItem("kindlifyre_code", CODE);

  elControls.style.display = "flex";
  elUtility.style.display = "flex";
  elRefresh.style.display = "inline-block";

  setStatus("Connected.");
  refresh();
  startPolling();
}

document.getElementById("connect").onclick = () => {
  const c = document.getElementById("code").value.trim();
  if(!/^\d{6}$/.test(c)){ setStatus("Enter your 6-digit code."); return; }
  connectWithCode(c);
};

document.getElementById("refresh").onclick = () => refresh();

document.getElementById("clearCode").onclick = () => {
  stopPolling();
  CODE = "";
  localStorage.removeItem("kindlifyre_code");
  document.getElementById("code").value = "";
  elControls.style.display = "none";
  elUtility.style.display = "none";
  elRefresh.style.display = "none";
  elArtWrap.style.display = "none";
  setText("—", "");
  setDeviceLabel("");
  setStatus("Enter code and connect.");
};

document.getElementById("next").onclick = async()=> {
  setStatus("…");
  const r = await apiCmd("next");
  if (!r.ok) setStatus("Error: " + (r.error || "next failed"));
  await new Promise(res => setTimeout(res, 450));
  await refresh();
};

document.getElementById("prev").onclick = async()=> {
  setStatus("…");
  const r = await apiCmd("prev");
  if (!r.ok) setStatus("Error: " + (r.error || "prev failed"));
  await new Promise(res => setTimeout(res, 450));
  await refresh();
};

document.getElementById("toggle").onclick = async()=> {
  setStatus("…");
  // Toggle by reading playback state (more accurate than “try pause then play”)
  const s = await apiState();
  if (!s.ok) { setStatus("Error: " + (s.error || "toggle failed")); return; }
  if (!s.active) { setStatus("Start playback on phone/speaker first."); return; }

  const isPlaying = !!s.data.is_playing;
  const r = await apiCmd(isPlaying ? "pause" : "play");
  if (!r.ok) setStatus("Error: " + (r.error || "command failed"));
  await new Promise(res => setTimeout(res, 350));
  await refresh();
};

// Auto-fill last code (Kindle-friendly)
(function init(){
  setStatus("Enter code and connect.");
  const saved = localStorage.getItem("kindlifyre_code");
  if (saved && /^\d{6}$/.test(saved)) {
    document.getElementById("code").value = saved;
    // Don't auto-connect without user tap (prevents confusion if code changed)
  }
})();
</script>
</body>
</html>
