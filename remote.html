<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1">
<title>Kindle Remote</title>
<style>
  body{font-family:sans-serif;text-align:center;margin:35px 10px;background:#fff;color:#000;}
  input{font-size:22px;padding:10px;width:160px;text-align:center;}
  button{font-size:22px;padding:16px 22px;margin:8px;min-width:120px;}
  #now{white-space:pre-line;font-size:18px;margin:16px 0;line-height:1.3;}
</style>
</head>
<body>

<h2>Kindle Spotify Remote</h2>
<p>Pair code:</p>
<input id="code" inputmode="numeric" maxlength="6" placeholder="123456">
<br>
<button id="connect">Connect</button>

<div id="now">—</div>
<div id="status"></div>

<div id="controls" style="display:none;">
  <div>
    <button id="prev">Prev</button>
    <button id="toggle">Play/Pause</button>
    <button id="next">Next</button>
  </div>
  <button id="refresh">Refresh</button>
</div>

<script>
const WORKER_BASE = "https://kindlifyre-api.andrespmanzewitsch.workers.dev";

const nowEl = document.getElementById("now");
const statusEl = document.getElementById("status");
const controlsEl = document.getElementById("controls");
let CODE = "";

function setStatus(t){ statusEl.textContent = t; }
function setNow(t){ nowEl.textContent = t; }

async function apiState(){
  const r = await fetch(`${WORKER_BASE}/state?code=${encodeURIComponent(CODE)}`);
  return r.json();
}
async function apiCmd(name){
  const r = await fetch(`${WORKER_BASE}/cmd?code=${encodeURIComponent(CODE)}&name=${encodeURIComponent(name)}`, { method:"POST" });
  return r.json();
}

async function refresh(){
  try{
    const s = await apiState();
    if(!s.ok) throw new Error(s.error || "error");
    if(!s.active){
      setNow("No active device.\nStart playing on your phone/speaker, then Refresh.");
      setStatus("Connected.");
      return;
    }
    const pb = s.data;
    const item = pb.item;
    const track = item?.name || "Unknown track";
    const artist = item?.artists?.map(a=>a.name).join(", ") || "Unknown artist";
    const device = pb.device?.name || "Unknown device";
    setNow(`${track} — ${artist}\nDevice: ${device}`);
    setStatus(pb.is_playing ? "Playing" : "Paused");
  }catch(e){
    setStatus("Error: " + (e.message || e));
  }
}

document.getElementById("connect").onclick = async () => {
  const c = document.getElementById("code").value.trim();
  if(!/^\d{6}$/.test(c)){ setStatus("Enter your 6-digit code."); return; }
  CODE = c;
  controlsEl.style.display = "block";
  setStatus("Connected. Refreshing...");
  await refresh();
  setInterval(refresh, 10000);
};

document.getElementById("refresh").onclick = refresh;
document.getElementById("next").onclick = async()=>{ setStatus("..."); await apiCmd("next"); await new Promise(r=>setTimeout(r,400)); await refresh(); };
document.getElementById("prev").onclick = async()=>{ setStatus("..."); await apiCmd("prev"); await new Promise(r=>setTimeout(r,400)); await refresh(); };
document.getElementById("toggle").onclick = async()=>{ setStatus("..."); 
  const p = await apiCmd("pause");
  if(!p.ok) await apiCmd("play");
  await refresh();
};
</script>
</body>
</html>
