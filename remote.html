<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Kindle Spotify Remote</title>

<style>
:root{ --fg:#000; --muted:#333; --radius:18px; }

body{ font-family:sans-serif; background:#fff; color:#000; margin:18px 10px; text-align:center; }
.wrap{ max-width:640px; margin:0 auto; }

.card{
  width:480px;
  max-width:92vw;
  margin:0 auto 18px;
  padding:20px 16px 18px;
  border:2px solid var(--fg);
  border-radius:var(--radius);
  box-sizing:border-box;
}

/* Pairing */
#qrBox{ width:300px; height:300px; margin:8px auto 0; }
#qrBox img,#qrBox canvas,#qrBox table{
  border:2px solid var(--fg);
  width:300px !important;
  height:300px !important;
  border-radius:0;
}
.qrFallback{
  width:300px;height:300px;border:2px dashed var(--fg);
  display:flex;align-items:center;justify-content:center;
  font-size:14px;color:var(--muted); box-sizing:border-box;
}
.divider{ width:300px; margin:18px auto 0; display:flex; align-items:center; }
.divider:before,.divider:after{ content:""; flex:1; height:1px; background:#000; opacity:0.25; }
.codeText{ margin-top:16px; font-size:30px; letter-spacing:6px; }

.newCode{
  margin-top:12px;
  font-size:14px;
  letter-spacing:2px;
  opacity:0.75;
  cursor:pointer;
}
.newCode:active{ opacity:1; }

/* Player */
.artWrap{
  width:300px;height:300px;margin:0 auto 14px;
  border:0;
  border-radius:14px;
  overflow:hidden;
  display:none;
  box-sizing:border-box;
}
.artWrap img{ width:100%; height:100%; object-fit:cover; display:block; }

/* ===== AJUSTES DE ESPACIADO ===== */

.track{
  font-size:22px;
  line-height:1.2;
  margin:8px 0 0;          /* sin espacio debajo */
  min-height:48px;         /* menos alto */
  overflow:hidden;
  text-overflow:ellipsis;
  display:-webkit-box;
  -webkit-line-clamp:2;
  -webkit-box-orient:vertical;
}

.artist{
  font-size:16px;
  color:var(--muted);
  margin:4px 0 10px;       /* más cerca del título, más aire abajo */
  white-space:nowrap;
  overflow:hidden;
  text-overflow:ellipsis;
}

.deviceType{
  min-height:28px;
  margin:0 0 6px;          /* elimina espacio superior */
  display:flex;
  align-items:center;
  justify-content:center;
  cursor:pointer;
}

/* ================================= */

.controls{
  display:none;
  justify-content:center;
  align-items:center;
  gap:36px;
  margin-top:10px;
}
.roundBtn{
  width:82px;height:82px;
  border-radius:999px;
  border:2px solid var(--fg);
  background:#fff;
  display:grid;
  place-items:center;
  padding:0;
}
.roundBtn.center{ width:92px;height:92px; }
.controls svg{ fill:#000; width:34px;height:34px; }
.roundBtn.center svg{ width:40px;height:40px; }

/* Device picker */
.picker{
  display:none;
  margin:12px auto 0;
  width:360px;
  max-width:86vw;
  border:2px solid var(--fg);
  border-radius:14px;
  padding:10px;
  box-sizing:border-box;
  text-align:left;
}
.pickerHeader{
  display:flex;
  align-items:center;
  justify-content:space-between;
  margin-bottom:8px;
}
.pickerTitle{
  font-size:14px;
  letter-spacing:1px;
  opacity:0.85;
}
.pickerClose{
  font-size:14px;
  padding:4px 10px;
  border:2px solid var(--fg);
  border-radius:999px;
  background:#fff;
}

.devRow{
  padding:10px;
  border:1px solid rgba(0,0,0,0.25);
  border-radius:12px;
  margin:8px 0;
  display:flex;
  align-items:center;
  justify-content:space-between;
}
.devName{
  font-size:16px;
  overflow:hidden;
  text-overflow:ellipsis;
  white-space:nowrap;
  max-width:260px;
}
.devType{
  font-size:12px;
  opacity:0.65;
  margin-top:2px;
}

.indicator{
  width:22px;height:22px;
  border:2px solid #000;
  border-radius:999px;
  display:flex;
  align-items:center;
  justify-content:center;
}
.indicator svg{
  width:14px;height:14px;
  display:none;
  fill:#000;
}
.indicator.active svg{ display:block; }

</style>
</head>

<body>
<div class="wrap">

  <div class="card" id="pairCard">
    <div id="qrBox"><div class="qrFallback">Loading…</div></div>
    <div class="divider"></div>
    <div class="codeText" id="codeText">------</div>
    <div class="newCode" id="newCode">NEW CODE</div>
  </div>

  <div class="card" id="playerCard">
    <div class="artWrap" id="artWrap"><img id="art" alt=""></div>

    <div class="track" id="track">—</div>
    <div class="artist" id="artist"></div>

    <div class="deviceType" id="deviceType">
      <svg id="iconPhone" viewBox="0 0 64 64" style="display:none;width:22px;height:22px;">
        <path d="M22 6h20a6 6 0 0 1 6 6v40a6 6 0 0 1-6 6H22a6 6 0 0 1-6-6V12a6 6 0 0 1 6-6zm0 8v36h20V14H22z"></path>
      </svg>
      <svg id="iconComputer" viewBox="0 0 64 64" style="display:none;width:24px;height:24px;">
        <path d="M8 12h48a4 4 0 0 1 4 4v26a4 4 0 0 1-4 4H8a4 4 0 0 1-4-4V16a4 4 0 0 1 4-4zm0 6v22h48V18H8zm18 30h12l2 6H24l2-6z"></path>
      </svg>
    </div>

    <div class="controls" id="controls">
      <button class="roundBtn" id="prev">
        ◀◀
      </button>

      <button class="roundBtn center" id="toggle">
        ▶
      </button>

      <button class="roundBtn" id="next">
        ▶▶
      </button>
    </div>
  </div>

</div>

<script>
/* Tu JS permanece igual */
</script>

</body>
</html>
