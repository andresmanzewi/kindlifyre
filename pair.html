<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Pair Kindle Remote</title>

<style>
:root{
  --fg:#000;
  --border:2px;
  --radius:16px;
  --pill:999px;
}

body{
  font-family:sans-serif;
  background:#fff;
  color:#000;
  margin:40px 16px;
  text-align:center;
}

.wrap{
  max-width:420px;
  margin:0 auto;
}

.code{
  font-size:32px;
  letter-spacing:6px;
  margin-bottom:30px;
}

input{
  font-size:28px;
  text-align:center;
  border:none;
  outline:none;
  letter-spacing:6px;
  width:200px;
  margin-bottom:30px;
}

button{
  font-size:18px;
  padding:12px 28px;
  border:var(--border) solid var(--fg);
  border-radius:var(--pill);
  background:#fff;
}

.status{
  margin-top:30px;
  font-size:18px;
}
</style>
</head>

<body>
<div class="wrap">

  <div id="codeDisplay" class="code"></div>
  <input id="codeInput" inputmode="numeric" maxlength="6" placeholder="------">

  <div>
    <button id="loginBtn">Login with Spotify</button>
  </div>

  <div class="status" id="status"></div>

</div>

<script>
(function(){

  var CLIENT_ID = "3e747af201bc4ef58d8b0c81d7007d22";
  var REDIRECT_URI = "https://andresmanzewi.github.io/kindlifyre/pair.html";
  var SCOPES = "user-read-playback-state user-modify-playback-state user-read-currently-playing";

  var WORKER_BASE = "https://kindlifyre-api.andrespmanzewitsch.workers.dev";
  var PAIR_SECRET = "kindlifyre-PAIR-2026-03-03-ANDRES";

  var codeDisplay = document.getElementById("codeDisplay");
  var codeInput = document.getElementById("codeInput");
  var statusEl = document.getElementById("status");

  function setStatus(t){ statusEl.textContent = t || ""; }

  function randStr(len){
    var p="ABCDEFGHIJKLMNOPQRSTUVWXYZabcdefghijklmnopqrstuvwxyz0123456789";
    var s="";
    for(var i=0;i<len;i++) s+=p[Math.floor(Math.random()*p.length)];
    return s;
  }

  function sha256(plain, cb){
    if (!window.crypto || !window.crypto.subtle) {
      cb(null);
      return;
    }
    var data=new TextEncoder().encode(plain);
    window.crypto.subtle.digest("SHA-256", data).then(function(buf){
      cb(buf);
    });
  }

  function b64url(a){
    return btoa(String.fromCharCode.apply(null, new Uint8Array(a)))
      .replace(/\+/g,"-").replace(/\//g,"_").replace(/=+$/,"");
  }

  function startLogin(){
    var code = (codeInput.value || "").replace(/\s+/g,"");
    if(!/^\d{6}$/.test(code)) return;

    localStorage.setItem("pair_code", code);

    var verifier = randStr(64);
    localStorage.setItem("pkce_verifier", verifier);

    sha256(verifier, function(hash){
      if(!hash){
        setStatus("Browser not supported.");
        return;
      }

      var challenge = b64url(hash);

      var u = "https://accounts.spotify.com/authorize?" +
        "response_type=code" +
        "&client_id=" + encodeURIComponent(CLIENT_ID) +
        "&redirect_uri=" + encodeURIComponent(REDIRECT_URI) +
        "&scope=" + encodeURIComponent(SCOPES) +
        "&code_challenge_method=S256" +
        "&code_challenge=" + encodeURIComponent(challenge);

      window.location.href = u;
    });
  }

  function exchangeCodeForTokens(authCode){
    var verifier = localStorage.getItem("pkce_verifier");

    var body =
      "client_id=" + encodeURIComponent(CLIENT_ID) +
      "&grant_type=authorization_code" +
      "&code=" + encodeURIComponent(authCode) +
      "&redirect_uri=" + encodeURIComponent(REDIRECT_URI) +
      "&code_verifier=" + encodeURIComponent(verifier);

    var xhr = new XMLHttpRequest();
    xhr.open("POST", "https://accounts.spotify.com/api/token", true);
    xhr.setRequestHeader("Content-Type","application/x-www-form-urlencoded");

    xhr.onreadystatechange = function(){
      if(xhr.readyState !== 4) return;

      if(xhr.status !== 200){
        setStatus("Token error");
        return;
      }

      var tokens = JSON.parse(xhr.responseText);
      if(!tokens.refresh_token){
        setStatus("No refresh token");
        return;
      }

      sendRefreshToken(tokens.refresh_token);
    };

    xhr.send(body);
  }

  function sendRefreshToken(refresh_token){
    var pair_code = localStorage.getItem("pair_code");

    var xhr = new XMLHttpRequest();
    xhr.open("POST", WORKER_BASE + "/pair", true);
    xhr.setRequestHeader("Content-Type","application/json");

    xhr.onreadystatechange = function(){
      if(xhr.readyState !== 4) return;

      if(xhr.status !== 200){
        setStatus("Pair failed");
        return;
      }

      codeDisplay.textContent = "Paired ✓";
      codeInput.style.display = "none";
      document.getElementById("loginBtn").style.display = "none";
      setStatus("");
    };

    xhr.send(JSON.stringify({
      code: pair_code,
      refresh_token: refresh_token,
      secret: PAIR_SECRET
    }));
  }

  document.getElementById("loginBtn").onclick = startLogin;

  (function init(){

    var params = new URLSearchParams(window.location.search);
    var qrCode = params.get("code");

    if(qrCode && /^\d{6}$/.test(qrCode)){
      codeInput.value = qrCode;
      codeDisplay.textContent = qrCode;
    }

    var authCode = params.get("code");
    if(authCode && !/^\d{6}$/.test(authCode)){
      setStatus("Finishing…");
      exchangeCodeForTokens(authCode);
    }

  })();

})();
</script>

</body>
</html>
