<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Pair</title>

<style>
:root{
  --fg:#000;
  --border:2px;
}

html, body{
  height:100%;
}

body{
  margin:0;
  background:#fff;
  color:#000;
  display:flex;
  align-items:center;
  justify-content:center;
  font-family:monospace;
}

.wrap{
  text-align:center;
  max-width:420px;
  padding:20px;
}

.code{
  font-size:34px;
  letter-spacing:6px;
  margin-bottom:28px;
}

button{
  font-family:monospace;
  font-size:18px;
  padding:10px 26px;
  border:var(--border) solid var(--fg);
  border-radius:999px;
  background:#fff;
}

.status{
  margin-top:26px;
  font-size:16px;
  letter-spacing:1px;
  line-height:1.55;
  white-space:pre-line; /* allow \n lines */
}
</style>
</head>

<body>
<div class="wrap">
  <div class="code" id="codeDisplay">------</div>
  <button id="loginBtn">LOGIN</button>
  <div class="status" id="status"></div>
</div>

<script>
(function(){

  var CLIENT_ID = "3e747af201bc4ef58d8b0c81d7007d22";
  var REDIRECT_URI = "https://andresmanzewi.github.io/kindlifyre/pair.html";
  var SCOPES = "user-read-playback-state user-modify-playback-state user-read-currently-playing";

  var WORKER_BASE = "https://kindlifyre-api.andrespmanzewitsch.workers.dev";
  var PAIR_SECRET = "kindlifyre-PAIR-2026-03-03-ANDRES";

  var codeDisplay = document.getElementById("codeDisplay");
  var statusEl = document.getElementById("status");
  var loginBtn = document.getElementById("loginBtn");

  function setStatus(t){ statusEl.textContent = t || ""; }
  function addLine(line){
    var cur = statusEl.textContent || "";
    statusEl.textContent = cur ? (cur + "\n" + line) : line;
  }

  function randCode(){
    return String(Math.floor(100000 + Math.random()*900000));
  }

  function randStr(len){
    var p="ABCDEFGHIJKLMNOPQRSTUVWXYZabcdefghijklmnopqrstuvwxyz0123456789";
    var s="";
    for(var i=0;i<len;i++) s+=p[Math.floor(Math.random()*p.length)];
    return s;
  }

  function sha256(plain, cb){
    if (!window.crypto || !window.crypto.subtle) { cb(null); return; }
    var data = new TextEncoder().encode(plain);
    window.crypto.subtle.digest("SHA-256", data).then(function(buf){ cb(buf); });
  }

  function b64url(a){
    return btoa(String.fromCharCode.apply(null, new Uint8Array(a)))
      .replace(/\+/g,"-").replace(/\//g,"_").replace(/=+$/,"");
  }

  function startLogin(){
    var pairCode = localStorage.getItem("pair_code") || "";
    if (!/^\d{6}$/.test(pairCode)) return;

    var verifier = randStr(64);
    localStorage.setItem("pkce_verifier", verifier);

    sha256(verifier, function(hash){
      if(!hash){ setStatus("UNSUPPORTED"); return; }

      var challenge = b64url(hash);

      var u = "https://accounts.spotify.com/authorize?" +
        "response_type=code" +
        "&client_id=" + encodeURIComponent(CLIENT_ID) +
        "&redirect_uri=" + encodeURIComponent(REDIRECT_URI) +
        "&scope=" + encodeURIComponent(SCOPES) +
        "&code_challenge_method=S256" +
        "&code_challenge=" + encodeURIComponent(challenge);

      window.location.href = u;
    });
  }

  function exchangeCodeForTokens(authCode){
    var verifier = localStorage.getItem("pkce_verifier") || "";

    var body =
      "client_id=" + encodeURIComponent(CLIENT_ID) +
      "&grant_type=authorization_code" +
      "&code=" + encodeURIComponent(authCode) +
      "&redirect_uri=" + encodeURIComponent(REDIRECT_URI) +
      "&code_verifier=" + encodeURIComponent(verifier);

    var xhr = new XMLHttpRequest();
    xhr.open("POST", "https://accounts.spotify.com/api/token", true);
    xhr.setRequestHeader("Content-Type","application/x-www-form-urlencoded");

    xhr.onreadystatechange = function(){
      if(xhr.readyState !== 4) return;

      if(xhr.status !== 200){ setStatus("TOKEN ERROR"); return; }

      var tokens = JSON.parse(xhr.responseText);
      if(!tokens.refresh_token){ setStatus("NO REFRESH TOKEN"); return; }

      sendRefreshToken(tokens.refresh_token);
    };

    xhr.send(body);
  }

  function sendRefreshToken(refresh_token){
    var pair_code = localStorage.getItem("pair_code") || "";

    var xhr = new XMLHttpRequest();
    xhr.open("POST", WORKER_BASE + "/pair", true);
    xhr.setRequestHeader("Content-Type","application/json");

    xhr.onreadystatechange = function(){
      if(xhr.readyState !== 4) return;

      if(xhr.status !== 200){ setStatus("PAIR FAILED"); return; }

      // Keep same page; "terminal" style with discrete updates
      loginBtn.style.display = "none";
      codeDisplay.textContent = pair_code;
      codeDisplay.style.fontSize = "28px";
      codeDisplay.style.letterSpacing = "6px";

      setStatus("");                // clear
      addLine("PAIRED ✓");

      setTimeout(function(){
        addLine("CONNECTED ✓");
      }, 650);

      setTimeout(function(){
        addLine("YOU MAY CLOSE THIS PAGE");
      }, 1400);
    };

    xhr.send(JSON.stringify({
      code: pair_code,
      refresh_token: refresh_token,
      secret: PAIR_SECRET
    }));
  }

  loginBtn.onclick = startLogin;

  (function init(){
    var params = new URLSearchParams(window.location.search);

    var pairingParam = (params.get("p") || "").trim();
    var authCode = params.get("code");

    // From QR
    if (/^\d{6}$/.test(pairingParam)) {
      localStorage.setItem("pair_code", pairingParam);
      codeDisplay.textContent = pairingParam;
    }

    // OAuth return
    if (authCode) {
      var stored = localStorage.getItem("pair_code") || "------";
      codeDisplay.textContent = stored;
      setStatus("…");
      exchangeCodeForTokens(authCode);
      history.replaceState({}, document.title, REDIRECT_URI);
      return;
    }

    // Direct open
    if (!pairingParam) {
      var fresh = randCode();
      localStorage.setItem("pair_code", fresh);
      codeDisplay.textContent = fresh;
    }
  })();

})();
</script>

</body>
</html>
